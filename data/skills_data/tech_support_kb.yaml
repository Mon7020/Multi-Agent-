# 技术支持知识库
# 格式：问题类型 -> {关键词, 解决方案列表, 需要补充的信息}

issue_types:
  hardware_issue:
    keywords:
      - 坏了
      - 不能开机
      - 死机
      - 黑屏
      - 屏幕不亮
      - 按键失灵
    solutions:
      - "检查设备是否正常通电，尝试长按电源键10秒强制关机后重新开机"
      - "如果设备有物理损坏（如摔碎屏幕、进水），建议联系售后维修"
      - "检查电池电量是否充足，尝试连接充电器后再开机"
      - "对于手机/平板：如果屏幕黑屏但有振动/铃声，说明屏幕可能损坏"
    need_more_info:
      - 设备型号
      - 具体故障现象
      - 故障发生时间
      - 是否有进水或摔落

  performance_issue:
    keywords:
      - 卡
      - 慢
      - 延迟
      - 卡顿
      - 发热
      - 发烫
      - 耗电
    solutions:
      - "关闭不常用的后台应用，释放内存"
      - "清理设备缓存：设置 → 应用 → 选择应用 → 清理缓存"
      - "检查系统是否有更新，升级到最新版本可能改善性能"
      - "如果是发热严重：避免边充电边使用，关闭不用的功能（GPS、蓝牙等）"
      - "如果耗电快：检查是否后台应用过多，关闭不必要的自启动应用"
    need_more_info:
      - 设备型号
      - 使用多久了
      - 具体哪个场景卡顿
      - 是否升级过系统

  software_issue:
    keywords:
      - 闪退
      - 打不开
      - APP闪退
      - 软件崩溃
      - 更新失败
    solutions:
      - "尝试重启设备后再打开应用"
      - "清理应用缓存或重新安装应用"
      - "检查应用是否有最新版本，更新到最新版本"
      - "检查系统存储空间是否充足"
      - "如果所有应用都闪退，可能是系统问题，尝试备份数据后恢复出厂设置"
    need_more_info:
      - 具体哪个应用
      - 闪退频率
      - 系统版本
      - 应用版本

  network_issue:
    keywords:
      - 连不上网
      - 没网
      - WiFi连不上
      - 蓝牙连不上
      - 信号差
      - 断网
    solutions:
      - "WiFi问题：尝试忘记网络后重新连接，或重启路由器"
      - "移动数据：检查是否欠费，或信号强度是否足够"
      - "蓝牙问题：确保设备蓝牙已开启，尝试取消配对后重新配对"
      - "信号差：检查是否在信号盲区，尝试更换位置"
      - "如果是4G/5G问题：可能基站故障，可联系运营商"
    need_more_info:
      - 连接方式
      - 错误提示信息
      - 故障持续时间

  usage_guidance:
    keywords:
      - 怎么用
      - 如何使用
      - 怎么设置
      - 怎么连接
      - 怎么配对
      - 怎么激活
    solutions:
      - "建议您查看产品说明书或官网的使用教程视频"
      - "我们提供在线技术支持，您可以描述具体想实现的功能"
      - "大多数设备连接方式：设置 → 蓝牙/网络 → 搜索并连接"
      - "如果是新设备首次使用，需要先激活/注册账号"
    need_more_info:
      - 具体想实现什么功能
      - 设备类型

  accessory_issue:
    keywords:
      - 充电
      - 充电器
      - 耳机没声音
      - 耳机一边不响
      - 数据线
      - 充电慢
    solutions:
      - "充电问题：检查充电器和数据线是否原装，尝试更换充电头或数据线"
      - "充电慢：使用原装充电器，非原装充电器可能充电慢或不兼容"
      - "耳机问题：检查耳机接口是否干净，尝试用棉签轻轻清理"
      - "一边没声音：检查是否插到位，尝试用其他设备测试耳机是否正常"
    need_more_info:
      - 配件类型
      - 具体症状
      - 是否原装配件
